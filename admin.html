<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMPANION — ADMIN</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700;900&display=swap');

  :root {
    --bg:      #080a0c;
    --s1:      #0f1115;
    --s2:      #161920;
    --s3:      #1e222b;
    --border:  #252a35;
    --border2: #2f3545;
    --text:    #bdc4d4;
    --muted:   #4e5668;
    --accent:  #00d4ff;
    --warn:    #ffb700;
    --danger:  #ff3b3b;
    --success: #00e676;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Barlow Condensed', sans-serif; min-height: 100vh; }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
    pointer-events: none; z-index: 9000;
  }

  /* ── TOPBAR ── */
  .topbar {
    height: 50px;
    background: var(--s1);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 20px; gap: 12px;
    position: sticky; top: 0; z-index: 200;
  }

  .logo {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px; letter-spacing: 0.2em; color: var(--accent);
    display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  }

  .logo-badge {
    background: var(--accent); color: #000;
    font-size: 9px; padding: 2px 6px; letter-spacing: 0.15em; font-weight: 700;
  }

  .topbar-sep { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }
  .topbar-spacer { flex: 1; }

  .server-field {
    display: flex; align-items: center; gap: 8px;
    font-family: 'Share Tech Mono', monospace; font-size: 11px;
  }
  .server-field label { color: var(--muted); white-space: nowrap; }

  input.mono {
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); font-family: 'Share Tech Mono', monospace;
    font-size: 11px; padding: 4px 8px; outline: none; height: 28px;
    transition: border-color 0.15s;
  }
  input.mono:focus { border-color: var(--accent); }

  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted); transition: all 0.3s; flex-shrink: 0;
  }
  .status-dot.ok  { background: var(--success); box-shadow: 0 0 6px var(--success); }
  .status-dot.err { background: var(--danger);  box-shadow: 0 0 6px var(--danger); }
  .status-dot.loading { background: var(--accent); animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  .tb-btn {
    height: 28px; padding: 0 14px;
    background: transparent; border: 1px solid var(--border);
    color: var(--text); font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; cursor: pointer; transition: all 0.12s;
    white-space: nowrap;
  }
  .tb-btn:hover { border-color: var(--accent); color: var(--accent); }
  .tb-btn.primary { background: var(--accent); border-color: var(--accent); color: #000; }
  .tb-btn.primary:hover { background: #33ddff; }
  .tb-btn.danger  { border-color: var(--danger); color: var(--danger); }

  /* ── PAGE LAYOUT ── */
  .page { max-width: 1100px; margin: 0 auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 28px; }

  /* ── SECTION ── */
  .section { display: flex; flex-direction: column; gap: 12px; }

  .section-head {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }

  .section-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase;
  }

  .section-actions { display: flex; gap: 8px; align-items: center; }

  /* ── BUTTON GRID (master list) ── */
  .btn-master-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 8px;
  }

  .btn-card {
    background: var(--s1);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: border-color 0.12s;
    position: relative;
    overflow: hidden;
  }
  .btn-card:hover { border-color: var(--border2); }
  .btn-card.selected { border-color: var(--accent); }

  .btn-card-bar { height: 4px; width: 100%; }

  .btn-card-body { padding: 10px 12px 10px; }

  .btn-card-label {
    font-size: 16px; font-weight: 700; letter-spacing: 0.06em;
    text-transform: uppercase; color: #fff; line-height: 1.1;
  }

  .btn-card-meta {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; color: var(--muted); margin-top: 4px;
  }

  .btn-card-chips {
    display: flex; flex-wrap: wrap; gap: 3px; margin-top: 6px; min-height: 16px;
  }

  .view-chip {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; padding: 1px 5px;
    border: 1px solid var(--border2); color: var(--muted); background: var(--s3);
  }

  .btn-card-del {
    position: absolute; top: 4px; right: 4px;
    background: none; border: none; color: var(--muted);
    font-size: 14px; cursor: pointer; line-height: 1; padding: 2px 4px;
    opacity: 0; transition: opacity 0.1s, color 0.1s;
  }
  .btn-card:hover .btn-card-del { opacity: 1; }
  .btn-card-del:hover { color: var(--danger); }

  .btn-add-card {
    background: transparent;
    border: 1px dashed var(--border);
    min-height: 80px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--muted); font-size: 24px;
    transition: all 0.12s;
  }
  .btn-add-card:hover { border-color: var(--accent); color: var(--accent); }

  /* ── EDIT PANEL ── */
  .edit-panel {
    background: var(--s1);
    border: 1px solid var(--accent);
    padding: 16px;
    display: none;
  }
  .edit-panel.open { display: block; }

  .edit-panel-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; letter-spacing: 0.2em; color: var(--accent);
    margin-bottom: 14px;
  }

  .edit-grid {
    display: grid;
    grid-template-columns: 100px 1fr 1fr auto;
    gap: 12px;
    align-items: start;
  }

  .edit-preview {
    width: 100px; height: 100px;
    background: var(--s2); border: 1px solid var(--border);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 6px;
    position: relative; overflow: hidden; flex-shrink: 0;
  }
  .edit-preview::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 3px; background: var(--preview-color, var(--accent));
  }
  .edit-preview-label {
    font-size: 14px; font-weight: 700; letter-spacing: 0.06em;
    text-transform: uppercase; color: #fff; text-align: center; padding: 0 6px; line-height: 1.1;
  }
  .edit-preview-meta {
    font-family: 'Share Tech Mono', monospace; font-size: 9px; color: var(--muted);
  }

  .edit-fields { display: flex; flex-direction: column; gap: 8px; }
  .field-group { display: flex; flex-direction: column; gap: 4px; }
  .field-lbl {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase;
  }
  input.field {
    background: var(--s2); border: 1px solid var(--border);
    color: var(--text); font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px; padding: 6px 8px; outline: none; width: 100%;
    transition: border-color 0.15s;
  }
  input.field:focus { border-color: var(--accent); }

  .field-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .field-row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

  .swatches { display: flex; flex-wrap: wrap; gap: 5px; }
  .swatch {
    width: 22px; height: 22px; border: 2px solid transparent;
    cursor: pointer; transition: transform 0.1s, border-color 0.1s;
  }
  .swatch:hover { transform: scale(1.15); }
  .swatch.active { border-color: #fff; transform: scale(1.1); }

  .edit-actions { display: flex; flex-direction: column; gap: 6px; justify-content: flex-start; }

  .action-btn {
    padding: 7px 16px; background: transparent;
    border: 1px solid var(--border); color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; cursor: pointer; transition: all 0.12s; white-space: nowrap;
  }
  .action-btn:hover { border-color: var(--accent); color: var(--accent); }
  .action-btn.primary { background: var(--accent); border-color: var(--accent); color: #000; }
  .action-btn.primary:hover { background: #33ddff; }
  .action-btn.cancel { color: var(--muted); }

  /* ── VIEWS ── */
  .views-layout { display: grid; grid-template-columns: 200px 1fr; gap: 12px; }

  .view-list-col { display: flex; flex-direction: column; gap: 4px; }

  .view-item {
    background: var(--s1); border: 1px solid var(--border);
    padding: 9px 12px; cursor: pointer;
    display: flex; align-items: center; justify-content: space-between;
    transition: border-color 0.1s;
  }
  .view-item:hover { border-color: var(--border2); }
  .view-item.selected { border-color: var(--accent); }

  .view-item-name { font-size: 14px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
  .view-item-count { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--muted); }

  .view-del-btn {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 14px; padding: 0 2px; line-height: 1;
    transition: color 0.1s; margin-left: 8px;
  }
  .view-del-btn:hover { color: var(--danger); }

  .new-view-row { display: flex; gap: 4px; }
  .new-view-row input {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px; font-weight: 600; padding: 6px 8px; outline: none;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .new-view-row input:focus { border-color: var(--accent); }

  /* assign panel */
  .assign-panel {
    background: var(--s1); border: 1px solid var(--border);
    display: flex; flex-direction: column;
    min-height: 140px;
  }

  .assign-header {
    padding: 8px 12px; border-bottom: 1px solid var(--border);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; color: var(--muted); letter-spacing: 0.15em;
    display: flex; align-items: center; justify-content: space-between;
  }

  .assign-grid {
    display: flex; flex-wrap: wrap; gap: 8px; padding: 12px;
  }

  .assign-tile {
    width: 90px; height: 90px;
    background: var(--s2); border: 1px solid var(--border);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 5px;
    cursor: pointer; position: relative; overflow: hidden;
    transition: border-color 0.1s; user-select: none;
  }
  .assign-tile::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 3px; background: var(--tile-color, var(--accent));
  }
  .assign-tile.assigned {
    border-color: var(--tile-color, var(--accent));
    box-shadow: inset 0 0 0 1px var(--tile-color, var(--accent));
  }
  .assign-tile.assigned::after {
    content: '✓'; position: absolute; top: 4px; right: 6px;
    font-size: 10px; font-weight: 700; color: var(--tile-color, var(--accent));
  }
  .assign-tile-label {
    font-size: 12px; font-weight: 700; letter-spacing: 0.06em;
    text-transform: uppercase; color: #fff; text-align: center; padding: 0 4px; line-height: 1.1;
  }
  .assign-tile-meta { font-family: 'Share Tech Mono', monospace; font-size: 9px; color: var(--muted); }

  .assign-empty {
    padding: 24px; font-family: 'Share Tech Mono', monospace;
    font-size: 10px; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase;
  }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--s2); border: 1px solid var(--border);
    font-family: 'Share Tech Mono', monospace; font-size: 11px;
    letter-spacing: 0.08em; padding: 10px 16px; z-index: 9999;
    opacity: 0; transform: translateY(8px);
    transition: opacity 0.2s, transform 0.2s; pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.ok   { border-color: var(--success); color: var(--success); }
  #toast.err  { border-color: var(--danger);  color: var(--danger); }
  #toast.inf  { border-color: var(--accent);  color: var(--accent); }
  #toast.warn { border-color: var(--warn);    color: var(--warn); }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">COMPANION <div class="logo-badge">ADMIN</div></div>
  <div class="topbar-sep"></div>

  <div class="server-field">
    <label>SERVER</label>
    <input class="mono" type="url" id="server-url" placeholder="https://your-app.up.railway.app" style="width:300px">
    <label>SECRET</label>
    <input class="mono" type="password" id="api-secret" placeholder="optional" style="width:130px">
    <div class="status-dot" id="status-dot"></div>
    <button class="tb-btn" id="btn-connect">CONNECT</button>
  </div>

  <div class="topbar-spacer"></div>
  <button class="tb-btn primary" id="btn-push">⬆ PUSH TO SURFACE</button>
</div>

<!-- PAGE -->
<div class="page">

  <!-- ── SECTION 1: BUTTONS ── -->
  <div class="section">
    <div class="section-head">
      <div class="section-label">// 1 — BUTTONS &nbsp;·&nbsp; create your buttons here</div>
      <div class="section-actions">
        <button class="tb-btn" id="btn-new">+ NEW BUTTON</button>
      </div>
    </div>

    <!-- Edit panel (shown when a button is selected) -->
    <div class="edit-panel" id="edit-panel">
      <div class="edit-panel-title">// EDITING BUTTON</div>
      <div class="edit-grid">
        <div class="edit-preview" id="edit-preview">
          <div class="edit-preview-label" id="preview-label">—</div>
          <div class="edit-preview-meta"  id="preview-meta">—</div>
        </div>
        <div class="edit-fields">
          <div class="field-group">
            <div class="field-lbl">Label</div>
            <input class="field" type="text" id="edit-label" maxlength="14" placeholder="BUTTON LABEL">
          </div>
          <div class="field-row3">
            <div class="field-group">
              <div class="field-lbl">Page</div>
              <input class="field" type="number" id="edit-page" min="1" max="99" placeholder="1">
            </div>
            <div class="field-group">
              <div class="field-lbl">Row</div>
              <input class="field" type="number" id="edit-row" min="0" max="7" placeholder="0">
            </div>
            <div class="field-group">
              <div class="field-lbl">Column</div>
              <input class="field" type="number" id="edit-col" min="0" max="7" placeholder="0">
            </div>
          </div>
        </div>
        <div class="field-group">
          <div class="field-lbl">Colour</div>
          <div class="swatches" id="edit-swatches"></div>
          <div style="margin-top:8px;display:flex;align-items:center;gap:8px;">
            <input type="checkbox" id="edit-deckcolor" style="accent-color:var(--accent);width:14px;height:14px;cursor:pointer;">
            <label for="edit-deckcolor" style="font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:0.1em;color:var(--muted);cursor:pointer;text-transform:uppercase;">
              Fill StreamDeck key with colour
            </label>
          </div>
        </div>
        <div class="edit-actions">
          <button class="action-btn primary" id="edit-apply">APPLY</button>
          <button class="action-btn cancel"  id="edit-cancel">CANCEL</button>
        </div>
      </div>
    </div>

    <div class="btn-master-grid" id="btn-master-grid"></div>
  </div>

  <!-- ── SECTION 2: VIEWS ── -->
  <div class="section">
    <div class="section-head">
      <div class="section-label">// 2 — VIEWS &nbsp;·&nbsp; group buttons into named views for the surface page</div>
    </div>

    <div class="views-layout">

      <!-- Left: view list -->
      <div class="view-list-col">
        <div id="view-list"></div>
        <div class="new-view-row">
          <input type="text" id="new-view-name" placeholder="VIEW NAME" maxlength="24">
          <button class="tb-btn" id="btn-add-view">ADD</button>
        </div>
      </div>

      <!-- Right: assign buttons to selected view -->
      <div class="assign-panel">
        <div class="assign-header">
          <span id="assign-title">← SELECT A VIEW TO ASSIGN BUTTONS</span>
          <span id="assign-count"></span>
        </div>
        <div id="assign-grid" class="assign-grid"></div>
      </div>

    </div>
  </div>

</div>

<div id="toast"></div>

<script>
// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const SWATCHES = [
  '#e63946','#ff6b35','#f4a261','#e9c46a','#52b788',
  '#00e676','#00d4ff','#457b9d','#a855f7','#ec4899',
  '#ffffff','#7c8499',
];

// ─── SERVER URL ───────────────────────────────────────────────────────────────
// Auto-detect when served by Railway; fall back to stored value otherwise
const isRemote = window.location.protocol.startsWith('http') &&
                 window.location.hostname !== 'localhost' &&
                 window.location.hostname !== '127.0.0.1';

let serverUrl = isRemote
  ? window.location.origin
  : (localStorage.getItem('cb_admin_server') || '');

let apiSecret = localStorage.getItem('cb_admin_secret') || '';

// ─── STATE ───────────────────────────────────────────────────────────────────
let state = loadLocal();
let selectedBtnId  = null;
let selectedViewId = null;
let editDraft      = null;
let pushTimer      = null; // debounce auto-push

function uid() { return Math.random().toString(36).slice(2, 9); }

function defaultState() {
  return { buttons: [], views: {} };
}

function loadLocal() {
  try {
    const s = localStorage.getItem('cb_admin_state');
    return s ? JSON.parse(s) : defaultState();
  } catch { return defaultState(); }
}

function saveLocal() {
  localStorage.setItem('cb_admin_state', JSON.stringify(state));
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
document.getElementById('server-url').value = serverUrl;
document.getElementById('api-secret').value = apiSecret;

// If auto-detected from Railway, keep the field read-only but visible
if (isRemote) {
  document.getElementById('server-url').value = serverUrl;
}

document.getElementById('server-url').addEventListener('change', e => {
  serverUrl = e.target.value.trim().replace(/\/$/, '');
  localStorage.setItem('cb_admin_server', serverUrl);
});
document.getElementById('api-secret').addEventListener('change', e => {
  apiSecret = e.target.value.trim();
  localStorage.setItem('cb_admin_secret', apiSecret);
});

document.getElementById('btn-connect').addEventListener('click', connect);
document.getElementById('btn-push').addEventListener('click', () => pushToServer(true));
document.getElementById('btn-new').addEventListener('click', newButton);
document.getElementById('btn-add-view').addEventListener('click', addView);
document.getElementById('new-view-name').addEventListener('keydown', e => { if (e.key === 'Enter') addView(); });
document.getElementById('edit-apply').addEventListener('click', applyEdit);
document.getElementById('edit-cancel').addEventListener('click', cancelEdit);

// Build swatch picker
const swatchWrap = document.getElementById('edit-swatches');
SWATCHES.forEach(c => {
  const s = document.createElement('div');
  s.className = 'swatch';
  s.style.background = c;
  s.dataset.color = c;
  s.addEventListener('click', () => {
    swatchWrap.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
    s.classList.add('active');
    if (editDraft) {
      editDraft.color = c;
      updatePreview();
    }
  });
  swatchWrap.appendChild(s);
});

render();
if (serverUrl) setTimeout(connect, 400);

// ─── CONNECTION ───────────────────────────────────────────────────────────────
async function connect() {
  if (!serverUrl) { toast('Enter a server URL first', 'err'); return; }
  setDot('loading');
  try {
    await apiFetch('/health');
    setDot('ok');
    await pullFromServer();
  } catch(e) {
    setDot('err');
    toast('Cannot reach server — check URL', 'err');
  }
}

async function pullFromServer() {
  try {
    const r = await apiFetch('/state');
    const data = await r.json();
    if (data.buttons && data.views !== undefined) {
      state = data;
      saveLocal();
      render();
      toast('Loaded from server', 'inf');
    }
  } catch(e) {
    toast('Could not load from server', 'warn');
  }
}

async function pushToServer(manual = false) {
  saveLocal();
  if (!serverUrl) {
    if (manual) toast('No server configured', 'warn');
    return;
  }
  try {
    const r = await apiFetch('/state', { method: 'PUT', body: JSON.stringify(state) });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    if (manual) toast('Pushed to surface ✓', 'ok');
    setDot('ok');
  } catch(e) {
    toast('Push failed: ' + e.message, 'err');
    setDot('err');
  }
}

// Auto-push with 600ms debounce after any change
function schedulePush() {
  clearTimeout(pushTimer);
  pushTimer = setTimeout(() => pushToServer(false), 600);
}

async function apiFetch(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (apiSecret) headers['x-api-secret'] = apiSecret;
  return fetch(serverUrl + path, { ...opts, headers });
}

function setDot(cls) {
  document.getElementById('status-dot').className = 'status-dot ' + cls;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  renderBtnGrid();
  renderViewList();
  renderAssignGrid();
}

// ── Button master grid ──
function renderBtnGrid() {
  const grid = document.getElementById('btn-master-grid');
  grid.innerHTML = '';

  state.buttons.forEach(btn => {
    const card = document.createElement('div');
    card.className = 'btn-card' + (btn.id === selectedBtnId ? ' selected' : '');
    card.dataset.id = btn.id;

    // colour bar
    const bar = document.createElement('div');
    bar.className = 'btn-card-bar';
    bar.style.background = btn.color;

    const body = document.createElement('div');
    body.className = 'btn-card-body';

    const lbl = document.createElement('div');
    lbl.className = 'btn-card-label';
    lbl.textContent = btn.label;

    const meta = document.createElement('div');
    meta.className = 'btn-card-meta';
    meta.textContent = `P${btn.page} R${btn.row ?? 0} C${btn.col ?? 0}`;

    // view chips
    const chips = document.createElement('div');
    chips.className = 'btn-card-chips';
    Object.values(state.views).forEach(v => {
      if (v.buttonIds.includes(btn.id)) {
        const c = document.createElement('div');
        c.className = 'view-chip';
        c.textContent = v.name;
        chips.appendChild(c);
      }
    });

    body.appendChild(lbl);
    body.appendChild(meta);
    body.appendChild(chips);

    const del = document.createElement('button');
    del.className = 'btn-card-del';
    del.textContent = '×';
    del.addEventListener('click', e => { e.stopPropagation(); deleteButton(btn.id); });

    card.appendChild(bar);
    card.appendChild(body);
    card.appendChild(del);
    card.addEventListener('click', () => selectButton(btn.id));
    grid.appendChild(card);
  });

  // Add card
  const add = document.createElement('div');
  add.className = 'btn-add-card';
  add.textContent = '+';
  add.addEventListener('click', newButton);
  grid.appendChild(add);
}

// ── Edit panel ──
function openEditPanel(btn) {
  editDraft = { ...btn };
  document.getElementById('edit-label').value    = btn.label;
  document.getElementById('edit-page').value     = btn.page;
  document.getElementById('edit-row').value      = btn.row ?? 0;
  document.getElementById('edit-col').value      = btn.col ?? 0;
  document.getElementById('edit-deckcolor').checked = btn.deckColor || false;

  // Set active swatch
  document.querySelectorAll('#edit-swatches .swatch').forEach(s => {
    s.classList.toggle('active', s.dataset.color === btn.color);
  });

  updatePreview();
  document.getElementById('edit-panel').classList.add('open');

  // Live preview on input
  document.getElementById('edit-label').oninput = () => {
    editDraft.label = document.getElementById('edit-label').value.toUpperCase();
    updatePreview();
  };
  document.getElementById('edit-page').oninput = () => {
    editDraft.page = parseInt(document.getElementById('edit-page').value) || 1;
    updatePreview();
  };
  document.getElementById('edit-row').oninput = () => {
    editDraft.row = parseInt(document.getElementById('edit-row').value) ?? 0;
    updatePreview();
  };
  document.getElementById('edit-col').oninput = () => {
    editDraft.col = parseInt(document.getElementById('edit-col').value) ?? 0;
    updatePreview();
  };
}

function updatePreview() {
  if (!editDraft) return;
  const p = document.getElementById('edit-preview');
  p.style.setProperty('--preview-color', editDraft.color);
  document.getElementById('preview-label').textContent = editDraft.label || '—';
  document.getElementById('preview-meta').textContent  = `P${editDraft.page} R${editDraft.row} C${editDraft.col}`;
}

function closeEditPanel() {
  document.getElementById('edit-panel').classList.remove('open');
  selectedBtnId = null;
  editDraft = null;
}

function applyEdit() {
  if (!editDraft) return;
  const idx = state.buttons.findIndex(b => b.id === editDraft.id);
  if (idx < 0) return;
  editDraft.deckColor = document.getElementById('edit-deckcolor').checked;
  state.buttons[idx] = { ...editDraft };
  closeEditPanel();
  render();
  schedulePush();
  toast('Button updated', 'ok');
}

function cancelEdit() {
  closeEditPanel();
  render();
}

// ── View list ──
function renderViewList() {
  const el = document.getElementById('view-list');
  el.innerHTML = '';

  Object.entries(state.views).forEach(([id, view]) => {
    const item = document.createElement('div');
    item.className = 'view-item' + (id === selectedViewId ? ' selected' : '');

    const name  = document.createElement('div');
    name.className = 'view-item-name';
    name.textContent = view.name;

    const count = document.createElement('div');
    count.className = 'view-item-count';
    count.textContent = view.buttonIds.length + ' btn';

    const del = document.createElement('button');
    del.className = 'view-del-btn';
    del.textContent = '×';
    del.addEventListener('click', e => { e.stopPropagation(); deleteView(id); });

    item.appendChild(name);
    item.appendChild(count);
    item.appendChild(del);
    item.addEventListener('click', () => selectView(id));
    el.appendChild(item);
  });
}

// ── Assign grid ──
function renderAssignGrid() {
  const grid    = document.getElementById('assign-grid');
  const title   = document.getElementById('assign-title');
  const countEl = document.getElementById('assign-count');
  grid.innerHTML = '';

  if (!selectedViewId || !state.views[selectedViewId]) {
    title.textContent   = '← SELECT A VIEW TO ASSIGN BUTTONS';
    countEl.textContent = '';
    grid.innerHTML = '';
    return;
  }

  const view = state.views[selectedViewId];
  title.textContent   = view.name;
  countEl.textContent = view.buttonIds.length + ' ASSIGNED';

  if (state.buttons.length === 0) {
    grid.innerHTML = '<div class="assign-empty">NO BUTTONS YET — CREATE SOME ABOVE</div>';
    return;
  }

  state.buttons.forEach(btn => {
    const assigned = view.buttonIds.includes(btn.id);
    const tile = document.createElement('div');
    tile.className = 'assign-tile' + (assigned ? ' assigned' : '');
    tile.style.setProperty('--tile-color', btn.color);
    tile.innerHTML = `<div class="assign-tile-label">${esc(btn.label)}</div>
                      <div class="assign-tile-meta">P${btn.page} B${btn.bank}</div>`;
    tile.addEventListener('click', () => toggleAssign(btn.id));
    grid.appendChild(tile);
  });
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function selectButton(id) {
  selectedBtnId = id;
  const btn = state.buttons.find(b => b.id === id);
  if (btn) openEditPanel(btn);
  renderBtnGrid();
}

function newButton() {
  const btn = {
    id: uid(),
    label: 'NEW',
    page: 1,
    row: 0,
    col: 0,
    color: SWATCHES[Math.floor(Math.random() * 8)],
  };
  state.buttons.push(btn);
  render();
  selectButton(btn.id);
  // Focus label input
  setTimeout(() => {
    const inp = document.getElementById('edit-label');
    if (inp) { inp.focus(); inp.select(); }
  }, 50);
}

function deleteButton(id) {
  state.buttons = state.buttons.filter(b => b.id !== id);
  Object.values(state.views).forEach(v => {
    v.buttonIds = v.buttonIds.filter(bid => bid !== id);
  });
  if (selectedBtnId === id) closeEditPanel();
  saveLocal();
  render();
  schedulePush();
  toast('Button deleted', 'inf');
}

function addView() {
  const input = document.getElementById('new-view-name');
  const name  = input.value.trim().toUpperCase();
  if (!name) return;
  if (Object.values(state.views).some(v => v.name === name)) {
    toast('View already exists', 'err'); return;
  }
  const id = uid();
  state.views[id] = { name, buttonIds: [] };
  input.value = '';
  saveLocal();
  selectView(id);
  schedulePush();
}

function deleteView(id) {
  delete state.views[id];
  if (selectedViewId === id) selectedViewId = null;
  saveLocal();
  render();
  schedulePush();
  toast('View deleted', 'inf');
}

function selectView(id) {
  selectedViewId = id;
  renderViewList();
  renderAssignGrid();
}

function toggleAssign(btnId) {
  if (!selectedViewId) return;
  const view = state.views[selectedViewId];
  const idx  = view.buttonIds.indexOf(btnId);
  if (idx >= 0) view.buttonIds.splice(idx, 1);
  else view.buttonIds.push(btnId);
  saveLocal();
  renderBtnGrid();
  renderViewList();
  renderAssignGrid();
  schedulePush();
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

let toastTimer;
function toast(msg, type = 'inf') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 2600);
}
</script>
</body>
</html>
