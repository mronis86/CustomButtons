<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>COMPANION REMOTE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;900&display=swap');

  :root {
    --bg:      #080a0c;
    --s1:      #0f1115;
    --s2:      #161920;
    --border:  #252a35;
    --text:    #bdc4d4;
    --muted:   #4e5668;
    --accent:  #00d4ff;
    --danger:  #ff3b3b;
    --success: #00e676;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    display: flex;
    flex-direction: column;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
    pointer-events: none;
    z-index: 9000;
  }

  /* ── FIRST-RUN OVERLAY ── */
  #setup {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 800;
    flex-direction: column;
    gap: 0;
  }

  #setup.hidden { display: none; }

  .setup-box {
    background: var(--s1);
    border: 1px solid var(--border);
    width: 380px;
    padding: 32px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .setup-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent);
  }

  .setup-desc {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    line-height: 1.7;
    letter-spacing: 0.04em;
  }

  .setup-field {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  .setup-field label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .setup-field input {
    background: var(--s2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 10px 12px;
    outline: none;
    width: 100%;
    transition: border-color 0.15s;
  }

  .setup-field input:focus { border-color: var(--accent); }

  .setup-btn {
    padding: 12px;
    background: var(--accent);
    border: none;
    color: #000;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 900;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    width: 100%;
    transition: background 0.12s;
  }
  .setup-btn:hover { background: #33ddff; }

  .setup-note {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.05em;
  }

  /* ── TOPBAR ── */
  .topbar {
    height: 46px;
    background: var(--s1);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    flex-shrink: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent);
    flex-shrink: 0;
  }

  .divider { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }

  .view-tabs {
    display: flex;
    gap: 4px;
    flex: 1;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .view-tabs::-webkit-scrollbar { display: none; }

  .view-tab {
    height: 28px;
    padding: 0 14px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.12s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .view-tab:hover { color: var(--text); }
  .view-tab.active { background: var(--accent); border-color: var(--accent); color: #000; }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
    flex-shrink: 0;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    transition: all 0.3s;
  }
  .status-dot.ok      { background: var(--success); box-shadow: 0 0 5px var(--success); }
  .status-dot.err     { background: var(--danger);  box-shadow: 0 0 5px var(--danger); }
  .status-dot.loading { background: var(--accent); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.2; } }

  /* small gear to re-open setup */
  .gear-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 14px;
    cursor: pointer;
    padding: 2px 4px;
    line-height: 1;
    transition: color 0.1s;
  }
  .gear-btn:hover { color: var(--accent); }

  /* ── GRID AREA ── */
  .grid-area {
    flex: 1;
    overflow-y: auto;
    padding: 18px;
    position: relative;
  }

  .grid-area::before {
    content: '';
    position: fixed;
    inset: 46px 0 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: 0.15;
    pointer-events: none;
  }

  .button-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 140px));
    gap: 10px;
    position: relative;
    z-index: 1;
  }

  /* ── TRIGGER BUTTON ── */
  .trig-btn {
    aspect-ratio: 1;
    background: var(--s2);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.08s, box-shadow 0.1s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .trig-btn::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--btn-color, var(--accent));
    transition: height 0.1s;
  }
  .trig-btn:hover::before { height: 6px; }

  .trig-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--btn-color, var(--accent));
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.05s;
  }

  .trig-btn.pressing::after { opacity: 0.2; }
  .trig-btn.pressing { transform: scale(0.94); }
  .trig-btn:hover { box-shadow: 0 0 0 1px var(--btn-color, var(--accent)); }

  @keyframes flash-ok  { 0% { box-shadow: 0 0 0 2px var(--success), 0 0 18px var(--success); } 100% { box-shadow: none; } }
  @keyframes flash-err { 0% { box-shadow: 0 0 0 2px var(--danger),  0 0 18px var(--danger);  } 100% { box-shadow: none; } }
  .trig-btn.success-flash { animation: flash-ok  0.4s ease-out; }
  .trig-btn.error-flash   { animation: flash-err 0.4s ease-out; }

  .trig-label {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: #fff;
    text-align: center;
    padding: 0 10px;
    line-height: 1.1;
    pointer-events: none;
  }

  .trig-meta {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    pointer-events: none;
  }

  /* ── CENTER STATE ── */
  .center-state {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    pointer-events: none;
  }
  .center-state .icon { font-size: 28px; opacity: 0.25; }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 16px;
    right: 16px;
    background: var(--s2);
    border: 1px solid var(--border);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 9px 14px;
    z-index: 9999;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.18s, transform 0.18s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.ok  { border-color: var(--success); color: var(--success); }
  #toast.err { border-color: var(--danger);  color: var(--danger);  }
  #toast.inf { border-color: var(--accent);  color: var(--accent);  }
</style>
</head>
<body>

<!-- FIRST-RUN SETUP — hidden after URL is saved -->
<div id="setup">
  <div class="setup-box">
    <div class="setup-title">// COMPANION REMOTE — CONNECT</div>
    <div class="setup-desc">Enter the Railway server URL below.<br>This is saved to your browser and won't be asked again.</div>

    <div class="setup-field">
      <label>Railway Server URL</label>
      <input type="url" id="setup-url" placeholder="https://your-app.up.railway.app" autocomplete="off" spellcheck="false">
    </div>

    <button class="setup-btn" id="setup-go">CONNECT</button>
    <div class="setup-note">Tap ⚙ in the top bar any time to change this.</div>
  </div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">COMPANION</div>
  <div class="divider"></div>
  <div class="view-tabs" id="view-tabs"></div>
  <div class="topbar-right">
    <div class="status-dot loading" id="status-dot"></div>
    <button class="gear-btn" id="gear-btn" title="Change server">⚙</button>
  </div>
</div>

<!-- GRID -->
<div class="grid-area" id="grid-area">
  <div class="center-state" id="center-state">
    <div class="icon">◻</div>
    <div id="center-msg">CONNECTING…</div>
  </div>
  <div class="button-grid" id="button-grid"></div>
</div>

<div id="toast"></div>

<script>
// ─── SERVER URL ───────────────────────────────────────────────────────────────
// When served by Railway, derive the URL automatically from window.location.
// Only show the setup prompt if opened from a local file or unknown origin.

const isRemote = window.location.protocol.startsWith('http') &&
                 window.location.hostname !== 'localhost' &&
                 window.location.hostname !== '127.0.0.1';

let SERVER = isRemote
  ? window.location.origin
  : (localStorage.getItem('cb_server_url') || '');

// ─── SETUP OVERLAY ────────────────────────────────────────────────────────────
const setupEl = document.getElementById('setup');
const setupInput = document.getElementById('setup-url');

function showSetup() {
  setupInput.value = SERVER;
  setupEl.classList.remove('hidden');
}

function hideSetup() {
  setupEl.classList.add('hidden');
}

document.getElementById('setup-go').addEventListener('click', doSetup);
setupInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSetup(); });
document.getElementById('gear-btn').addEventListener('click', showSetup);

function doSetup() {
  const val = setupInput.value.trim().replace(/\/$/, '');
  if (!val) return;
  SERVER = val;
  localStorage.setItem('cb_server_url', SERVER);
  hideSetup();
  init();
}

// Auto-start — skip setup if we have a URL
if (SERVER) {
  hideSetup();
  init();
}

// ─── STATE ────────────────────────────────────────────────────────────────────
let appState   = null;
let activeView = localStorage.getItem('cb_view') || null;

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
  setDot('loading');
  setCenterMsg('CONNECTING…');

  try {
    const r = await fetch(SERVER + '/state');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    appState = await r.json();
    localStorage.setItem('cb_state_cache', JSON.stringify(appState));
    setDot('ok');
    renderTabs();
    renderGrid();
  } catch(e) {
    setDot('err');
    setCenterMsg('CANNOT REACH SERVER');
    toast('Cannot connect — tap ⚙ to check server URL', 'err');

    // Fall back to cache so page is usable offline
    const cached = localStorage.getItem('cb_state_cache');
    if (cached) {
      appState = JSON.parse(cached);
      renderTabs();
      renderGrid();
      toast('Showing cached layout', 'inf');
    }
  }
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderTabs() {
  const tabs = document.getElementById('view-tabs');
  tabs.innerHTML = '';
  if (!appState?.views) return;

  const entries = Object.entries(appState.views);
  if (!activeView || !appState.views[activeView]) {
    activeView = entries[0]?.[0] || null;
  }

  entries.forEach(([id, view]) => {
    const tab = document.createElement('button');
    tab.className = 'view-tab' + (id === activeView ? ' active' : '');
    tab.textContent = view.name;
    tab.addEventListener('click', () => {
      activeView = id;
      localStorage.setItem('cb_view', id);
      renderTabs();
      renderGrid();
    });
    tabs.appendChild(tab);
  });
}

function renderGrid() {
  const grid = document.getElementById('button-grid');
  grid.innerHTML = '';

  if (!appState || !activeView || !appState.views[activeView]) {
    setCenterMsg('NO VIEW SELECTED');
    return;
  }

  const ids  = appState.views[activeView].buttonIds || [];
  const btns = ids.map(id => appState.buttons.find(b => b.id === id)).filter(Boolean);

  if (btns.length === 0) {
    setCenterMsg('NO BUTTONS IN THIS VIEW');
    return;
  }

  setCenterMsg(null);

  btns.forEach(btn => {
    const el = document.createElement('div');
    el.className = 'trig-btn';
    el.style.setProperty('--btn-color', btn.color);
    el.innerHTML = `
      <div class="trig-label">${esc(btn.label)}</div>
      <div class="trig-meta">P${btn.page} · B${btn.bank}</div>
    `;

    const pressStart = () => el.classList.add('pressing');
    const pressEnd   = () => el.classList.remove('pressing');
    el.addEventListener('mousedown',  pressStart);
    el.addEventListener('mouseup',    pressEnd);
    el.addEventListener('mouseleave', pressEnd);
    el.addEventListener('touchstart', pressStart, { passive: true });
    el.addEventListener('touchend',   pressEnd);
    el.addEventListener('click', () => trigger(btn, el));

    grid.appendChild(el);
  });
}

// ─── TRIGGER ─────────────────────────────────────────────────────────────────
async function trigger(btn, el) {
  try {
    const r = await fetch(SERVER + '/trigger', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ page: btn.page, bank: btn.bank }),
    });
    const data = await r.json();
    if (data.ok) {
      flash(el, 'success-flash');
    } else {
      flash(el, 'error-flash');
      toast('Error: ' + (data.error || 'unknown'), 'err');
    }
  } catch(e) {
    flash(el, 'error-flash');
    toast('Trigger failed — check connection', 'err');
  }
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function flash(el, cls) {
  el.classList.add(cls);
  setTimeout(() => el.classList.remove(cls), 450);
}

function setDot(cls) {
  document.getElementById('status-dot').className = 'status-dot ' + cls;
}

function setCenterMsg(msg) {
  const el = document.getElementById('center-state');
  if (!msg) { el.style.display = 'none'; return; }
  el.style.display = 'flex';
  document.getElementById('center-msg').textContent = msg;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

let toastTimer;
function toast(msg, type = 'inf') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 3000);
}
</script>
</body>
</html>
